<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>네즈밍 강화하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        @keyframes move-right {
            0% { left: 0; }
            100% { left: calc(100% - 25px); }
        }
        @keyframes move-left {
            0% { left: calc(100% - 25px); }
            100% { left: 0; }
        }
        #box {
            width: 25px;
            height: 50px;
            background-color: black;
            position: absolute;            
        }
    </style>
</head>

<body class="text-center align-middle">
    <h2>네즈밍 강화하기</h2>
    <div id="topScreen" class="row justify-content-center">
        <div class="col-3">
            <div id="rec" class="align-middle"></div>
            <div id="logged"></div>
        </div>
        <div class="col-3">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#shopModal">
                상점
            </button>
        </div>
    </div>
    <div id="mainScreen">
        <div style="display: flex; justify-content: center;">
            <img id="image" style="border: 1px black solid">
            <div class="align-middle" style="align-content: center; width: 20vw;">
                <div id="text" class="align-middle"></div>
                <div id="perc" class="align-middle"></div>
                <div id="revPerc" class="align-middle"></div>
                <div>
                    <button id="openQte" class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#qteBar"
                        aria-expanded="false" aria-controls="qteBar">할 수 있나?</button>
                    <button id="openItem" class="btn btn-primary" type="button" data-bs-toggle="collapse" data-bs-target="#inventory"
                        aria-expanded="false" aria-controls="inventory">아이템 사용</button>
                </div>
                
                <div id="myGroup">
                    <div >
                        <div class="collapse multi-collapse" id="qteBar" data-bs-parent="#myGroup">
                            강화 또는 박살
                            <div id="qte" class="w-100 m-2" style="position: relative; height: 50px;">
                                <div class="w-100 h-100" style="background-color: red;">
                                    <div class="w-75 h-100 mx-auto" style="background-color: yellow;">
                                        <div class="w-50 h-100 mx-auto" style="background-color: green;">
                                            <div id="box"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>                
                    <div >
                        <div class="collapse multi-collapse" id="inventory" data-bs-parent="#myGroup">
                            <div id="buiedItems">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="defendSwitch" disabled>
                                    <label class="form-check-label" for="defendSwitch">
                                        방어권: <span id="defendCount">0매</span>
                                    </label>
                                </div>
                                <div>
                                    <label>
                                        5위 점프권: <span id="fiveCount"> 0매 </span>
                                    </label>
                                    <button class="btn btn-primary" id="fiveSwitch" disabled onclick="jumpFive()">사용</button>
                                </div>                                
                            </div>
                        </div>
                    </div>
                
                </div>
                
                <button class="btn btn-success" onclick="setRandom()">강화</button>
                <button class="btn btn-danger m-1" onclick="reset()">초기화</button>
            </div>
        </div>
    </div>
    <div class="modal fade" id="shopModal" tabindex="-1" aria-labelledby="shopModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="shopModalLabel">일단 상점</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col">
                            하락시 치즈 획득
                        </div>
                        <div class="col">
                            박살시 네즈밍 조각 획득
                        </div>
                    </div>
                    <div class="row">
                        <div class="col" id="cheeze">
                            cheeze
                        </div>
                        <div class="col" id="broken">
                            broken
                        </div>
                    </div>
                    <div>
                        <div>
                            <span>
                                하락 방어권
                            </span>
                            <button onclick="buyItem('defend',1000)">1000</button>
                        </div>
                        <div>
                            <span>
                                5위 점프권
                            </span>
                            <button onclick="buyItem('five',2000)">2000</button>
                        </div>
                        <div id="unlockQte">
                            <span>
                                고오급 강화
                            </span>
                            <button onclick="buyItem('unlockQte',10000)">10000</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
        // ─────────────────────────────────────────────
        // 1. 상수 / 데이터 테이블
        // ─────────────────────────────────────────────
        const DATA = [
            { image: "./img/01_마요.png",          name: "미도미도 마요",            percentage: 0  },
            { image: "./img/02_바오밥나무.png",    name: "바오밥나무 네즈밍",        percentage: 10 },
            { image: "./img/03_볼드의대형해머.png",name: "볼드의 대형 해머 네즈밍",  percentage: 20 },
            { image: "./img/04_처형자의대검.png",  name: "처형자의 대검 네즈밍",     percentage: 30 },
            { image: "./img/05_클레이모어.png",    name: "클레이모어 네즈밍",        percentage: 40 },
            { image: "./img/06_바스타드소드.png",  name: "바스타드 소드 네즈밍",     percentage: 50 },
            { image: "./img/07_야구빠따.png",      name: "야구빠따 네즈밍",          percentage: 60 },
            { image: "./img/08_커터칼.png",        name: "커터칼 네즈밍",            percentage: 70 },
            { image: "./img/09_눈썹칼.png",        name: "눈썹칼 네즈밍",            percentage: 80 },
            { image: "./img/10_이쑤시개.png",      name: "이쑤시개 네즈밍",          percentage: 90 },
        ];

        const ENHANCE = {
            FAIL_DROP_RATE:   50, // 실패 시 하락 확률 (%)
            DROP_BREAK_RATE:  50, // 하락 시 박살 확률 (%)
            MAX_RANK:          9, // 최저 등급 인덱스 (숫자 클수록 약함)
        };

        // ─────────────────────────────────────────────
        // 2. 게임 상태 (단일 객체)
        // ─────────────────────────────────────────────
        const state = {
            rank:   9, // 현재 랭크 인덱스 (0 = 최고, 9 = 최저)
            cheeze: 0,
            broken: 0,
        };

        // ─────────────────────────────────────────────
        // 3. localStorage 유틸
        // ─────────────────────────────────────────────
        const Store = {
            get:    (key, fallback = 0) => {
                const val = localStorage.getItem(key);
                return val === null ? fallback : parseInt(val, 10);
            },
            set:    (key, val) => localStorage.setItem(key, String(val)),
            has:    (key)      => localStorage.getItem(key) !== null,
            clear:  ()         => localStorage.clear(),
        };

        // ─────────────────────────────────────────────
        // 4. DOM 캐싱
        // ─────────────────────────────────────────────
        const DOM = {
            image:       document.getElementById("image"),
            text:        document.getElementById("text"),
            perc:        document.getElementById("perc"),
            record:      document.getElementById("rec"),
            logged:      document.getElementById("logged"),
            cheeze:      document.getElementById("cheeze"),
            broken:      document.getElementById("broken"),
            defendCount: document.getElementById("defendCount"),
            fiveCount:   document.getElementById("fiveCount"),
            defendSwitch:document.getElementById("defendSwitch"),
            fiveSwitch:  document.getElementById("fiveSwitch"),
            unlockQte:   document.getElementById("unlockQte"),
            openQte:     document.getElementById("openQte"),
            qteBar:      document.getElementById("qteBar"),
            qte:         document.getElementById("qte"),
            box:         document.getElementById("box"),
        };

        // ─────────────────────────────────────────────
        // 5. UI 렌더링
        // ─────────────────────────────────────────────
        const render = {
            context() {
                const { rank } = state;
                const item = DATA[rank];
                DOM.image.src      = item.image;
                DOM.text.innerText = `${rank + 1}위 ${item.name}`;
                DOM.perc.innerText =
                    `강화확률: ${item.percentage}%\n실패시 50%확률로 하락\n하락시 50%확률로 박살`;

                const best = Math.min(rank, Store.get("best", rank));
                Store.set("best", best);
                DOM.record.innerText = `최고 기록: ${best + 1}위`;

                render.log(best);
            },

            // 갤러리 로그: 최고 기록 이후 달성한 등급들만 표시
            log(best) {
                DOM.logged.innerHTML = Array.from(
                    { length: ENHANCE.MAX_RANK - best + 1 },
                    (_, i) => {
                        const idx = best + i;
                        return `<a onclick="render.image(${idx})">${idx + 1}</a> `;
                    }
                ).join("");
            },

            // 이미지만 단독 교체 (갤러리 클릭용)
            image(idx) {
                DOM.image.src = DATA[idx].image;
            },

            cheeze() {
                DOM.cheeze.innerText = `현재 치즈: ${state.cheeze}`;
                Store.set("cheeze", state.cheeze);
            },

            broken() {
                DOM.broken.innerText = `박살난 네즈밍: ${state.broken}`;
                Store.set("broken", state.broken);
            },

            // 아이템 UI 공통 업데이트
            item(key, countEl, switchEl) {
                const count = Store.get(key, 0);
                countEl.innerText   = `${count}매`;
                switchEl.disabled   = count <= 0;
            },

            qteUnlock(unlocked) {
                DOM.unlockQte.classList.toggle("visually-hidden", unlocked);
                DOM.openQte.classList.toggle("disabled", !unlocked);
                DOM.openQte.innerText = unlocked ? "할 수 있나?" : "아직...";
            },
        };

        // ─────────────────────────────────────────────
        // 6. 강화 로직
        // ─────────────────────────────────────────────
        const rand = () => Math.floor(Math.random() * 100);

        /** 강화 성공: 랭크 상승 (인덱스 감소) */
        function enhance() {
            if (state.rank > 0) state.rank -= 1;
            render.context();
        }

        /** 강화 실패 처리: 하락 or 박살 */
        function degradeOrBreak() {
            if (rand() < ENHANCE.DROP_BREAK_RATE) {
                // 박살
                state.broken += ENHANCE.MAX_RANK - state.rank;
                state.rank    = ENHANCE.MAX_RANK;
                render.broken();
            } else {
                // 하락 → 치즈 보상
                state.cheeze += (ENHANCE.MAX_RANK - state.rank) * 100;
                render.cheeze();
                if (state.rank < ENHANCE.MAX_RANK) state.rank += 1;
            }
            render.context();
        }

        /** 하락 방어권 소비 시도. 성공 시 true 반환 */
        function tryDefend() {
            if (!DOM.defendSwitch.checked) return false;
            const count = Store.get("defend", 0);
            if (count <= 0) return false;

            Store.set("defend", count - 1);
            render.item("defend", DOM.defendCount, DOM.defendSwitch);
            return true;
        }

        /** QTE 결과에 따라 강화/실패 판정 */
        function resolveQte() {
            const half     = DOM.qte.offsetWidth / 2;
            const rect     = DOM.box.getBoundingClientRect();
            const qteRect  = DOM.qte.getBoundingClientRect();
            const posLeft  = rect.left  - qteRect.left;
            const posRight = qteRect.right - rect.right;

            // 박스가 오른쪽 절반에 있으면 posRight 기준, 왼쪽 절반이면 posLeft 기준
            const pos = posLeft > half ? posRight : posLeft;

            if (pos > half / 2)       { enhance();       return true; }
            if (pos > half / 4)       { /* yellow zone */ return true; }
            /* red zone */              degradeOrBreak(); return true;
        }

        /** 강화 버튼 클릭 메인 핸들러 */
        function setRandom() {
            if (DOM.qteBar.classList.contains("show")) {
                resolveQte();
                return;
            }

            const perc = DATA[state.rank].percentage;
            if (rand() < perc && state.rank > 0) {
                enhance();
                return;
            }

            // 실패 — 하락 여부 판정
            if (rand() < ENHANCE.FAIL_DROP_RATE) {
                if (!tryDefend()) degradeOrBreak();
            }
        }

        // ─────────────────────────────────────────────
        // 7. 아이템
        // ─────────────────────────────────────────────
        function buyItem(key, price) {
            if (state.cheeze < price) return;

            const count = Store.get(key, 0);
            Store.set(key, count + 1);
            state.cheeze -= price;
            render.cheeze();

            if (key === "defend") render.item("defend", DOM.defendCount, DOM.defendSwitch);
            if (key === "five")   render.item("five",   DOM.fiveCount,   DOM.fiveSwitch);
            if (key === "unlockQte") render.qteUnlock(true);
        }

        function jumpFive() {
            if (!confirm("사용시 즉시 소모됩니다. 사용하시겠습니까?")) return;

            const count = Store.get("five", 0);
            if (count <= 0) return;
            if (state.rank < 4 && !confirm("현재 네즈밍이 5위보다 높습니다. 사용하시겠습니까?")) return;

            Store.set("five", count - 1);
            render.item("five", DOM.fiveCount, DOM.fiveSwitch);
            state.rank = 4;
            render.context();
        }

        // ─────────────────────────────────────────────
        // 8. QTE 박스 애니메이션 (requestAnimationFrame)
        // ─────────────────────────────────────────────
        let animId    = null;
        let direction = 1; // 1 = 오른쪽, -1 = 왼쪽

        function moveBox() {
            const rect    = DOM.box.getBoundingClientRect();
            const parent  = DOM.qte.getBoundingClientRect();
            const atRight = rect.right  >= parent.right  - 1;
            const atLeft  = rect.left   <= parent.left   + 1;

            if (atRight && direction ===  1) {
                DOM.box.style.animation = "move-left 2s ease-in-out infinite";
                direction = -1;
            } else if (atLeft && direction === -1) {
                DOM.box.style.animation = "move-right 2s ease-in-out infinite";
                direction = 1;
            }

            animId = requestAnimationFrame(moveBox);
        }

        function startMoveBox() {
            if (animId !== null) return; // 중복 실행 방지
            DOM.box.style.animation = "move-right 2s ease-in-out infinite";
            direction = 1;
            animId = requestAnimationFrame(moveBox);
        }

        // ─────────────────────────────────────────────
        // 9. 초기화 / 리셋
        // ─────────────────────────────────────────────
        function init() {
            // best 기록
            if (!Store.has("best")) Store.set("best", state.rank);

            // 수치 상태 복원
            state.cheeze = Store.has("cheeze") ? Store.get("cheeze") : 0;
            state.broken = Store.has("broken") ? Store.get("broken") : 0;
            Store.set("cheeze", state.cheeze);
            Store.set("broken", state.broken);

            // 아이템 UI 복원
            render.item("defend", DOM.defendCount, DOM.defendSwitch);
            render.item("five",   DOM.fiveCount,   DOM.fiveSwitch);

            // QTE 해금 상태 복원
            render.qteUnlock(Store.has("unlockQte"));

            // 화면 갱신
            render.cheeze();
            render.broken();
            render.context();

            startMoveBox();
        }

        function reset() {
            Store.clear();
            state.rank   = ENHANCE.MAX_RANK;
            state.cheeze = 0;
            state.broken = 0;
            Store.set("best", state.rank);
            render.cheeze();
            render.broken();
            render.context();
        }

        // ─────────────────────────────────────────────
        // 10. 진입점
        // ─────────────────────────────────────────────
        init();
    </script>
</body>

</html>
